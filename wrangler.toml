name = "srimaharaja"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# ⚠️ IMPORTANT: wrangler.toml is the SOURCE OF TRUTH
#
# The dashboard message "Bindings managed through wrangler.toml" is CORRECT.
# You CANNOT add bindings manually in the dashboard when using wrangler.toml.
#
# These bindings WILL be applied automatically on your next deployment.
#
# Required setup:
# 1. Create R2 bucket named "srimaharaja-images" in your Cloudflare R2 dashboard
# 2. Push this file to git - bindings apply automatically

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "srimaharaja-images"
preview_bucket_name = "srimaharaja-images"

# Local development environment variables
# ⚠️ Replace these with your actual keys before deploying
[vars]
RAZORPAY_KEY_ID = "YOUR_RAZORPAY_KEY_ID"
RAZORPAY_KEY_SECRET = "YOUR_RAZORPAY_KEY_SECRET"
RESEND_API_KEY = "YOUR_RESEND_API_KEY"
FIREBASE_DATABASE_URL = "https://maharajagroups-29c74-default-rtdb.firebaseio.com"
RAZORPAY_WEBHOOK_SECRET = "YOUR_RAZORPAY_WEBHOOK_SECRET"
